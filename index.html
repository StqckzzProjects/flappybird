<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STQCKZZ BIRD | MULTIPLAYER</title>
    <link rel="stylesheet" href="css/style.css?v=3.2">
</head>
<body>
    <div id="game-container">
        <div id="nav-menu" class="overlay">
            <h1 class="neon-text">STQCKZZ BIRD</h1>
            <div class="menu-options">
                <button class="nav-btn local" onclick="uiAction.enterLobby('local')">LOCAL PLAY</button>
                <button class="nav-btn online" onclick="uiAction.enterLobby('online')">ONLINE ARENA</button>
            </div>
        </div>

        <div id="lobby-menu" class="overlay" style="display:none;">
            <h2 class="neon-header">SYSTEM LOBBY</h2>
            
            <div id="online-controls" class="network-bar" style="display:none;">
                <div id="public-rooms-container">
  <h3>PUBLIC ROOMS</h3>

  <div id="public-rooms-list"></div>
</div>
                <div class="host-section">
                    <input type="text" id="session-id" placeholder="ROOM CODE">
                    <select id="room-size">
                        <option value="2">2 PLAYERS</option>
                        <option value="4">4 PLAYERS</option>
                        <option value="6">6 PLAYERS (MAX)</option>
                    </select>
                    <button id="toggle-leaderboard-btn" onclick="toggleLeaderboardView()">
  SHOW ALL
</button>
                    <button class="net-btn host" onclick="netAction.host()">CREATE</button>
                </div>
                <select id="leaderboard-mode">
                    <option value="all">ALL MODES</option>
                    <option value="classic">CLASSIC</option>
                    <option value="hardcore">HARDCORE</option>
                  </select>
                  <div id="leaderboard-list"></div>

                <div class="rooms-container">
                    <h3>ACTIVE CORES</h3>
                    <div id="rooms-list-data"></div>
                    <select id="room-privacy">
  <option value="public">PUBLIC</option>
  <option value="private">PRIVATE</option>
</select>
                    <button class="net-btn join" onclick="netAction.join()">JOIN BY CODE</button>
                </div>
            </div>

            <div class="lobby-grid" id="player-slots-container"></div>
<button
  id="add-local-player-btn"
  class="initialize-btn"
  onclick="uiAction.addPlayer(true)"
  style="display:none; margin-top:15px;"
>
  ADD LOCAL PLAYER
</button>
            <div class="settings-bar">
                <select id="game-mode">
                    <option value="classic">CLASSIC PROTOCOL</option>
                    <option value="hardcore">HARDCORE (MOVING)</option>
                    <option value="zen">ZEN STATE</option>
                </select>
            </div>

            <button class="initialize-btn" onclick="netAction.broadcastStart()">START SYSTEM</button>
            <div class="terminate-session" onclick="location.reload()">ABORT</div>
        </div>

        <div id="die-menu" class="overlay" style="display:none;">
            <h1 class="neon-header" style="color: #ff3131;">SYSTEM CRASH</h1>
            <div id="results-list"></div>
            <button class="initialize-btn" onclick="rebootGame()">
  REBOOT
</button>
            <button class="terminate-session" onclick="location.reload()">MENU</button>
        </div>

        <canvas id="birdCanvas" width="1000" height="700" style="display:none;"></canvas>
    </div>

    <script src="/socket.io/socket.io.js?v=3.2"></script>
    <script src="js/colors.js?v=3.2"></script>
    <script src="js/mode.js?v=3.2"></script>
    <script src="js/entities.js?v=3.2"></script>
    <script src="js/game.js?v=3.2"></script>
    <script src="js/lobby.js?v=3.2"></script>
    <script src="js/network.js?v=3.2"></script>
    <script src="js/leaderboard.js?v=3.2"></script>
</body>
</html>
